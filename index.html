<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usualguy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
            overflow: hidden;
            position: relative;
        }
        
        /* Lava lamp background */
        .lava-lamp {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .lava-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 25s infinite ease-in-out;
        }
        .lava-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #ff6b6b;
            top: -10%;
            left: -5%;
            animation-delay: 0s;
        }
        .lava-blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #4ecdc4;
            top: 50%;
            left: 60%;
            animation-delay: -8s;
        }
        .lava-blob:nth-child(3) {
            width: 450px;
            height: 450px;
            background: #ffe66d;
            top: 60%;
            left: 10%;
            animation-delay: -16s;
        }
        .lava-blob:nth-child(4) {
            width: 380px;
            height: 380px;
            background: #ff8c42;
            top: 10%;
            left: 70%;
            animation-delay: -12s;
        }
        .lava-blob:nth-child(5) {
            width: 420px;
            height: 420px;
            background: #a8e6cf;
            top: 30%;
            left: 40%;
            animation-delay: -20s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -40px) scale(1.15); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }
        
        .container {
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }
        
        .outline-element {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            animation: fade-drift 3s ease-in-out forwards;
            font-size: 14px;
        }
        
        @keyframes fade-drift {
            0% { 
                opacity: 0; 
                transform: translate(0, 0) scale(0.5) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                opacity: 0; 
                transform: translate(var(--dx, 30px), var(--dy, -50px)) scale(1.2) rotate(var(--rot, 180deg));
            }
        }
        
        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }
        a {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
            position: relative;
            z-index: 1;
        }
        a:hover {
            background: #0052a3;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #eee;
            }
            p {
                color: #aaa;
            }
            a {
                background: #66b3ff;
                color: #1a1a1a;
            }
            a:hover {
                background: #4da3ff;
            }
            .lava-lamp {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>
    <div class="lava-lamp">
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
    </div>
    
    <div class="container">
        <h1 id="title">Welcome to my web garden</h1>
        <p>A quiet corner of the internet where I share thoughts, notes, and ideas.</p>
        <a href="/usualblog/">Visit Blog →</a>
    </div>
    
    <script>
        const emojis = ['🌸', '🦋', '✨', '🌿', '🍃', '⭐', '🌙', '💫', '🎨', '🪐', '🌺', '🍀', '🌻', '💜', '🧡'];
        const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#ff8c42', '#a8e6cf', '#ff6b9d', '#c4a5ff', '#6b9fff'];
        const title = document.getElementById('title');
        
        function createRandomElement(x, y) {
            const element = document.createElement('div');
            element.className = 'outline-element';
            
            const type = Math.random();
            
            if (type < 0.4) {
                // Emoji
                element.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                element.style.fontSize = (Math.random() * 10 + 12) + 'px';
            } else if (type < 0.7) {
                // Circle
                const size = Math.random() * 12 + 8;
                const color = colors[Math.floor(Math.random() * colors.length)];
                element.style.width = size + 'px';
                element.style.height = size + 'px';
                element.style.borderRadius = '50%';
                element.style.background = `radial-gradient(circle, ${color}, transparent)`;
                element.style.boxShadow = `0 0 10px ${color}`;
            } else {
                // Tiny line
                const width = Math.random() * 20 + 10;
                const color = colors[Math.floor(Math.random() * colors.length)];
                element.style.width = width + 'px';
                element.style.height = '2px';
                element.style.background = color;
                element.style.borderRadius = '2px';
            }
            
            // Random drift direction
            const dx = (Math.random() - 0.5) * 80;
            const dy = -Math.random() * 60 - 20;
            const rot = (Math.random() - 0.5) * 360;
            element.style.setProperty('--dx', dx + 'px');
            element.style.setProperty('--dy', dy + 'px');
            element.style.setProperty('--rot', rot + 'deg');
            
            element.style.left = x + 'px';
            element.style.top = y + 'px';
            
            document.body.appendChild(element);
            
            setTimeout(() => {
                element.remove();
            }, 3000);
        }
        
        function spawnAlongTextOutline() {
            const rect = title.getBoundingClientRect();
            const padding = 8;
            
            // Top edge
            for (let i = 0; i < rect.width; i += 25) {
                if (Math.random() > 0.6) {
                    createRandomElement(rect.left + i, rect.top - padding);
                }
            }
            // Bottom edge
            for (let i = 0; i < rect.width; i += 25) {
                if (Math.random() > 0.6) {
                    createRandomElement(rect.left + i, rect.bottom + padding);
                }
            }
            // Left edge
            for (let i = 0; i < rect.height; i += 20) {
                if (Math.random() > 0.6) {
                    createRandomElement(rect.left - padding, rect.top + i);
                }
            }
            // Right edge
            for (let i = 0; i < rect.height; i += 20) {
                if (Math.random() > 0.6) {
                    createRandomElement(rect.right + padding, rect.top + i);
                }
            }
        }
        
        // Spawn elements around text outline
        setInterval(spawnAlongTextOutline, 800);
        
        // Handle resize
        window.addEventListener('resize', () => {
            document.querySelectorAll('.outline-element').forEach(c => c.remove());
        });
    </script>
</body>
</html>
