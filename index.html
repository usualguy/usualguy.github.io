<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usualguy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
        }
        a {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover {
            background: #0052a3;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #eee;
            }
            p {
                color: #aaa;
            }
            a {
                background: #66b3ff;
                color: #1a1a1a;
            }
            a:hover {
                background: #4da3ff;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to my web garden</h1>
        <p>A quiet corner of the internet where I share thoughts, notes, and ideas.</p>
        <a href="/usualblog/">Visit Blog →</a>
    </div>
</body>
</html>
