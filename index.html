<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usualguy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
            overflow: hidden;
            position: relative;
        }
        
        /* Lava lamp background - earth tones for plants */
        .lava-lamp {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .lava-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 15s infinite ease-in-out;
        }
        .lava-blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: #5a8f5a;
            top: -10%;
            left: -5%;
            animation-delay: 0s;
        }
        .lava-blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: #7cb37c;
            top: 50%;
            left: 60%;
            animation-delay: -8s;
        }
        .lava-blob:nth-child(3) {
            width: 450px;
            height: 450px;
            background: #8fbc8f;
            top: 60%;
            left: 10%;
            animation-delay: -16s;
        }
        .lava-blob:nth-child(4) {
            width: 380px;
            height: 380px;
            background: #6b8e6b;
            top: 10%;
            left: 70%;
            animation-delay: -12s;
        }
        .lava-blob:nth-child(5) {
            width: 420px;
            height: 420px;
            background: #9acd9a;
            top: 30%;
            left: 40%;
            animation-delay: -20s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -40px) scale(1.15); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }
        
        /* Plant emoji background layer */
        .plant-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        
        .plant-emoji {
            position: absolute;
            font-size: 20px;
            opacity: 0.7;
        }
        
        .container {
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 3rem;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            position: relative;
            background: transparent;
            color: #ffffff;
            overflow: visible;
            transition: all 0.2s;
            z-index: 1;
        }
        
        .btn-text {
            position: relative;
            z-index: 10;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .btn-emoji {
            position: absolute;
            font-size: 14px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #eee;
            }
            p {
                color: #aaa;
            }
            .lava-lamp {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>
    <div class="lava-lamp">
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
        <div class="lava-blob"></div>
    </div>
    
    <div class="plant-layer" id="plantLayer"></div>
    
    <div class="container">
        <h1>Welcome to my web garden</h1>
        <p>A quiet corner of the internet where I share thoughts, notes, and ideas.</p>
        <a href="/usualblog/" class="btn" id="blogBtn"><span class="btn-text">Visit Blog</span></a>
    </div>
    
    <script>
        (function() {
            // Green plant emojis only
            const plantEmojis = ['🌱', '🌿', '🍃', '🎋', '🪴', '🍀', '🌲', '🌳', '🌴', '🌵'];
            const plantLayer = document.getElementById('plantLayer');
            const btn = document.getElementById('blogBtn');
            
            if (!plantLayer) {
                console.error('plantLayer not found');
                return;
            }
            
            // Create fixed number of emojis scattered across background (no animation)
            const bgEmojiCount = 40;
            
            for (let i = 0; i < bgEmojiCount; i++) {
                const emoji = document.createElement('div');
                emoji.className = 'plant-emoji';
                emoji.textContent = plantEmojis[Math.floor(Math.random() * plantEmojis.length)];
                
                const size = Math.random() * 16 + 14;
                emoji.style.fontSize = size + 'px';
                
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                emoji.style.left = x + 'px';
                emoji.style.top = y + 'px';
                
                plantLayer.appendChild(emoji);
            }
            
            // Fill button with 200 emojis using ellipse distribution
            function fillButtonWithEmojis() {
                const rect = btn.getBoundingClientRect();
                const btnEmojiCount = 200;
                
                // Remove existing button emojis
                btn.querySelectorAll('.btn-emoji').forEach(e => e.remove());
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const radiusX = rect.width * 0.7;
                const radiusY = rect.height * 0.7;
                
                for (let i = 0; i < btnEmojiCount; i++) {
                    const emoji = document.createElement('div');
                    emoji.className = 'btn-emoji';
                    emoji.textContent = plantEmojis[Math.floor(Math.random() * plantEmojis.length)];
                    
                    const size = Math.random() * 6 + 10;
                    emoji.style.fontSize = size + 'px';
                    
                    // Ellipse distribution - more concentrated in center
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()) * 0.9;
                    
                    const x = centerX + r * radiusX * Math.cos(angle) - size/2;
                    const y = centerY + r * radiusY * Math.sin(angle) - size/2;
                    emoji.style.left = x + 'px';
                    emoji.style.top = y + 'px';
                    
                    btn.appendChild(emoji);
                }
            }
            
            // Fill button after a short delay to ensure it's rendered
            setTimeout(fillButtonWithEmojis, 100);
            
            // Refill on resize
            window.addEventListener('resize', function() {
                fillButtonWithEmojis();
            });
            
            console.log('Plant emoji system initialized');
        })();
    </script>
</body>
</html>
